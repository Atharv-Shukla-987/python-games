<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="colorsel">
        <button class="btn" data-color="#00ff00" style="background:#2e4242;">DARK MODE</button>
    </div>
    <div>
        <div class="scores">
            <h1 id="score">SCORE: <span id="score-value">000</span></h1>
            <h1 id="text">HIGH SCORE: <span id="highscore">000</span></h1>
        </div> <div class="game-border-1">
            <div class="game-border-2">
                <div class="game-border-3">
                    <div id="game-board"></div>
                </div>
            </div>
        </div>
    </div>
    
    <h1 id="instruction-text">Press space bar to start the game</h1>
    <img id="logo" src="snake-game-ai-gen.png" alt="snake-logo" />
    <audio id="eat-sound" src="https://playsnake.org/assets/audio/high.mp3"></audio>
    <audio id="death-sound" src="https://playsnake.org/assets/audio/die.mp3"></audio>
    <audio id="bg-music" src="https://cdn.pixabay.com/audio/2025/05/01/audio_adf34e1888.mp3" loop></audio>
</body>
</html>
